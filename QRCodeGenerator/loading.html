<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Studio - Loading</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --accent: #10b981;
            --dark: #0f172a;
            --dark-lighter: #1e293b;
            --white: #ffffff;
            --glow: rgba(59, 130, 246, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: var(--white);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Pattern */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(245, 158, 11, 0.1) 0%, transparent 50%);
            z-index: 1;
            animation: patternFloat 20s ease-in-out infinite;
        }

        @keyframes patternFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-20px, -20px) rotate(1deg); }
            66% { transform: translate(20px, -10px) rotate(-1deg); }
        }

        /* Loading Container */
        .loading-container {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* QR Code Animation */
        .qr-loader {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 3rem;
            animation: qrFloat 3s ease-in-out infinite;
        }

        @keyframes qrFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        .qr-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 2px;
            width: 160px;
            height: 160px;
            margin: 20px auto;
            position: relative;
        }

        .qr-dot {
            background: var(--primary);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
            animation: dotPulse 2s ease-in-out infinite;
        }

        .qr-dot::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 2px;
            background: var(--white);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            animation: dotGlow 2s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { 
                transform: scale(1);
                opacity: 0.3;
            }
            50% { 
                transform: scale(1.2);
                opacity: 1;
            }
        }

        @keyframes dotGlow {
            0%, 100% { 
                opacity: 0;
                transform: translate(-50%, -50%) scale(0);
            }
            50% { 
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* Corner Markers */
        .corner-marker {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid var(--primary);
            border-radius: 6px;
            animation: cornerPulse 2s ease-in-out infinite;
        }

        .corner-marker::before {
            content: '';
            position: absolute;
            inset: 6px;
            background: var(--primary);
            border-radius: 2px;
        }

        .corner-marker.top-left {
            top: 0;
            left: 0;
        }

        .corner-marker.top-right {
            top: 0;
            right: 0;
        }

        .corner-marker.bottom-left {
            bottom: 0;
            left: 0;
        }

        @keyframes cornerPulse {
            0%, 100% { 
                opacity: 0.5;
                transform: scale(1);
            }
            50% { 
                opacity: 1;
                transform: scale(1.05);
            }
        }

        /* Loading Text */
        .loading-text {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textGlow 2s ease-in-out infinite;
        }

        @keyframes textGlow {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .loading-subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 2rem;
            animation: subtitleFade 3s ease-in-out infinite;
        }

        @keyframes subtitleFade {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.9; }
        }

        /* Progress Bar */
        .progress-container {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 0 auto 2rem;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 2px;
            width: 0%;
            animation: progressGrow 3s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: progressShimmer 2s ease-in-out infinite;
        }

        @keyframes progressGrow {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        @keyframes progressShimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Loading Dots */
        .loading-dots {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            align-items: center;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: dotBounce 1.5s ease-in-out infinite;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBounce {
            0%, 80%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            40% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat 10s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0% {
                opacity: 0;
                transform: translate(0, 100vh) scale(0);
            }
            10% {
                opacity: 1;
                transform: translate(10px, 80vh) scale(1);
            }
            90% {
                opacity: 1;
                transform: translate(-10px, 20vh) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(0, 0) scale(0);
            }
        }

        .particle:nth-child(1) { 
            left: 10%; 
            animation-delay: 0s; 
            animation-duration: 8s;
        }
        .particle:nth-child(2) { 
            left: 30%; 
            animation-delay: 2s; 
            animation-duration: 10s;
        }
        .particle:nth-child(3) { 
            left: 50%; 
            animation-delay: 4s; 
            animation-duration: 12s;
        }
        .particle:nth-child(4) { 
            left: 70%; 
            animation-delay: 6s; 
            animation-duration: 9s;
        }
        .particle:nth-child(5) { 
            left: 90%; 
            animation-delay: 8s; 
            animation-duration: 11s;
        }

        /* Glow Effect */
        .glow-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
            border-radius: 50%;
            animation: glowPulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glowPulse {
            0%, 100% { 
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }
            50% { 
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .qr-loader {
                width: 150px;
                height: 150px;
            }

            .qr-grid {
                width: 120px;
                height: 120px;
                gap: 1.5px;
            }

            .corner-marker {
                width: 30px;
                height: 30px;
                border-width: 2px;
            }

            .corner-marker::before {
                inset: 4px;
            }

            .loading-text {
                font-size: 1.25rem;
            }

            .loading-subtitle {
                font-size: 0.875rem;
            }

            .progress-container {
                width: 250px;
            }

            .glow-effect {
                width: 200px;
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Pattern -->
    <div class="bg-pattern"></div>

    <!-- Floating Particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <!-- Loading Container -->
    <div class="loading-container">
        <!-- Glow Effect -->
        <div class="glow-effect"></div>

        <!-- QR Code Loader -->
        <div class="qr-loader">
            <div class="qr-grid">
                <!-- Generate random QR dots -->
                <script>
                    document.write(Array(64).fill().map((_, i) => {
                        const isActive = Math.random() > 0.3;
                        const delay = Math.random() * 2;
                        return `<div class="qr-dot" style="animation-delay: ${delay}s; opacity: ${isActive ? '1' : '0.1'}"></div>`;
                    }).join(''));
                </script>
            </div>
            <!-- Corner Markers -->
            <div class="corner-marker top-left"></div>
            <div class="corner-marker top-right"></div>
            <div class="corner-marker bottom-left"></div>
        </div>

        <!-- Loading Text -->
        <h1 class="loading-text">QR Code Studio</h1>
        <p class="loading-subtitle">Initializing Professional Code Generator</p>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <!-- Loading Dots -->
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
        // Auto-redirect after loading animation
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 3000);

        // Add dynamic QR dot animation
        document.addEventListener('DOMContentLoaded', () => {
            const dots = document.querySelectorAll('.qr-dot');
            dots.forEach((dot, index) => {
                setInterval(() => {
                    const isActive = Math.random() > 0.5;
                    dot.style.opacity = isActive ? '1' : '0.1';
                }, 1000 + (index * 100));
            });
        });
    </script>
</body>
</html>
